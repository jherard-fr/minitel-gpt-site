name: Deploy to OVH (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Sync → minitel-gpt.herard.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Injecter la clé Resend (hors dépôt, depuis le secret GitHub)
        run: printf "<?php return '%s';\n" "${{ secrets.RESEND_API_KEY }}" > resend-key.php

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_HOST }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASS }}
          protocol:   ftp
          port:       21
          local-dir:  ./
          server-dir: /www-minitel-gpt/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            **/.DS_Store
            data/**
            recolor_logo.py
          state-name: .ftp-deploy-sync-state.json
